name: Python SAST Deserialization Check

on:
  push:
    branches: [ dev_branch ]
  pull_request:
    branches: [ master]

jobs:
  sast:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run SAST deserialization analyzer
        continue-on-error: true
        run: |
            python sast_cli.py . --config config.yaml --format sarif --output sast_report.sarif --no-fail
        
      - name: Upload SARIF report
        if: always() && hashFiles('sast_report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
            sarif_file: sast_report.sarif

      - name: Fail if vulnerabilities found
        run: |
          python - << 'PY'
          import json

          with open("sast_report.sarif", "r", encoding="utf-8") as f:
              report = json.load(f)

          results = report["runs"][0].get("results", [])
          count = len(results)

          print(f"Found vulnerabilities: {count}")

          if count > 0:
              raise SystemExit(1)
          PY
