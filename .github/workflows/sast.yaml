name: Python SAST Deserialization Check

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  sast:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run SAST deserialization analyzer
        continue-on-error: true
        run: |
          python sast_cli.py . --config config.yaml --format sarif --output sast_report.sarif

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sast_report.sarif